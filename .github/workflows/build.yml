name: Build

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pyinstaller
      - run: |
          ICON=""
          [ -f icon.icns ] && ICON="--icon icon.icns"
          pyinstaller --noconfirm --windowed --name PhotoSorter --hidden-import tkinter.scrolledtext $ICON PhotoSorter.py
          # Ad-hoc sign (avoids "damaged" on Apple Silicon; still shows unverified until notarized)
          codesign --force --deep --sign - dist/PhotoSorter.app
          cp packaging/Open\ PhotoSorter.command packaging/FIRST\ TIME\ ON\ MAC.txt dist/
          chmod +x dist/Open\ PhotoSorter.command
          # tar preserves symlinks; zip does not and breaks PyInstaller 6+ .app bundles
          COPYFILE_DISABLE=1 tar -czf dist/PhotoSorter-mac.tar.gz -C dist \
            PhotoSorter.app "Open PhotoSorter.command" "FIRST TIME ON MAC.txt"
        shell: bash
      - uses: actions/upload-artifact@v4
        with:
          name: PhotoSorter-mac
          path: dist/PhotoSorter-mac.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pyinstaller
      - run: |
          $iconArgs = if (Test-Path "icon.ico") { @("--icon", "icon.ico") } else { @() }
          pyinstaller --noconfirm --onefile --windowed --name PhotoSorter --hidden-import tkinter.scrolledtext @iconArgs PhotoSorter.py
        shell: pwsh
      - uses: actions/upload-artifact@v4
        with:
          name: PhotoSorter-windows
          path: dist/PhotoSorter.exe
